<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskify - Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Taskify</h1>
        
        <form id="task-form">
            <div class="form-group">
                <input type="text" id="task-title" placeholder="Enter task title..." autocomplete="off">
                <span class="error-msg" id="error-title"></span>
            </div>
            <div class="form-group">
                <textarea id="task-desc" placeholder="Enter task description (optional)..." rows="2"></textarea>
            </div>
            <button type="submit">Add Task</button>
        </form>

        <h2>Your Daily Tasks</h2>
        <div id="tasks-container">
            <p class="loading">Loading tasks...</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
